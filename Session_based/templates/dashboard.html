<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:40px;
}

.container{
    width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0px 0px 10px lightgray;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid gray;
}

th,td{
    padding:10px;
    text-align:left;
}

button{
    margin-top:20px;
    padding:10px 20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Session-Based Authentication Dashboard</h2>

<hr>

<h3>Welcome {{ username }}</h3>

<table>

<tr>
<th>Current Username</th>
<td>{{ username }}</td>
</tr>

<tr>
<th>Login Time</th>
<td>{{ login_time }}</td>
</tr>

<tr>
<th>Authentication Status</th>
<td>{{ authentication_status }}</td>
</tr>

<tr>
<th>Session Variables</th>
<td>
<pre>{{ session_data }}</pre>
</td>
</tr>

<tr>
<th>Session Contents</th>
<td>
<pre>{{ session }}</pre>
</td>
</tr>

</table>

<br>

<a href="/logout">
<button>
Logout
</button>
</a>

</div>

</body>

</html>
