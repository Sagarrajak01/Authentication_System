<!DOCTYPE html>
<html>

<head>
    <title>User Registration</title>

    <style>
        body{
            font-family:Arial;
            margin:40px;
            background:#f4f4f4;
        }

        .container{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0px 0px 8px lightgray;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
        }

        .message{
            color:red;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<p class="message">{{ message }}</p>

<form method="POST">

<label>Username</label>

<input
type="text"
name="username"
required>

<label>Password</label>

<input
type="password"
name="password"
required>

<button type="submit">
Register
</button>

</form>

<br>

<a href="/login">
Already Registered? Login
</a>

</div>

</body>
</html>
